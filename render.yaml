services:
  - type: web
    name: inventory-backend
    env: python
    buildCommand: |
      cd backend
      pip install -r requirements.txt
      pip install gunicorn psycopg2-binary
      python manage.py collectstatic --noinput
      python manage.py migrate
    startCommand: "cd backend && gunicorn inventory_backend.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: inventory-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "localhost,127.0.0.1,*"
      - key: DEBUG
        value: "False"

  - type: web
    name: inventory-frontend
    env: node
    buildCommand: "cd my-app && npm install && npm run build"
    startCommand: "cd my-app && npx serve -s build"
    envVars:
      - key: REACT_APP_API_URL
        fromService:
          type: web
          name: inventory-backend
          property: host

databases:
  - name: inventory-db
    databaseName: inventory
    user: inventory_user
